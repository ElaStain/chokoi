services:

  streamlit:

    build: ./apps/chokoi_app

    ports:
      - "8501:8501"

    depends_on:
      - postgres

  postgres:

    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

  spark:

    image: bitnami/spark:latest

